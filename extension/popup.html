<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; width: 236px; padding: 16px; margin: 0; color: #0c0c0d; }
      .head { display: flex; align-items: center; gap: 9px; margin-bottom: 13px; }
      .head img { width: 26px; height: 26px; display: block; }
      .head h1 { font-size: 14px; font-weight: 700; margin: 0; }
      .status { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: #1c7d4d; }
      .dot { width: 9px; height: 9px; border-radius: 50%; background: #1c7d4d; flex: none; }
      .hint { font-size: 11.5px; color: #9aa2b4; margin-top: 8px; line-height: 1.45; }
    </style>
  </head>
  <body>
    <div class="head"><img src="icons/icon-48.png" alt="" /><h1>Otto Tabs</h1></div>
    <div class="status"><span class="dot"></span><span id="status">Connected</span></div>
    <div class="hint">Otto opens drafts, docs and pages here for you — into one “Otto” tab group.</div>
    <script src="popup.js"></script>
  </body>
</html>
