    <meta name="description" content="Otto reads your inbox, calendar and Drive, then quietly does the to-dos it safely can — drafting replies, prepping docs, organizing tasks — and surfaces only what needs you." />

    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Self-heal after a deploy: if the app's JS module fails to load (stale HTML/service-worker
         pointing at an old hashed bundle), nuke SW caches and hard-reload ONCE instead of a blank page. -->
    <script>
      window.addEventListener("error", function (e) {
        var t = e.target;
        if (!(t && t.tagName === "SCRIPT" && t.type === "module")) return;
        if (sessionStorage.getItem("otto-recovered")) return;
        sessionStorage.setItem("otto-recovered", "1");
        var wipe = window.caches ? caches.keys().then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); }) : Promise.resolve();
        wipe.then(function () {
          if (navigator.serviceWorker) return navigator.serviceWorker.getRegistrations().then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister(); })); });
        }).then(function () { location.reload(); });
      }, true);
    </script>
    <script type="module" src="/client/main.tsx"></script>
  </body>
</html>
